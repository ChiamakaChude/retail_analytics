# schema definitions for validation and documentation

schemas:
  orders_schema:
    primary_key: order_id

    columns:
      - name: order_id
        type: integer
        nullable: true

      - name: user_id
        type: integer
        nullable: true

      - name: eval_set
        type: string
        nullable: true

      - name: order_number
        type: integer
        nullable: true

      - name: order_dow
        type: integer
        nullable: true

      - name: order_hour_of_day
        type: integer
        nullable: true

      - name: days_since_prior_order
        type: double
        nullable: true

